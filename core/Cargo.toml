[package]
name = "tantale_core"
version = "0.1.0"
edition = "2021"

[lib]
path = "src/lib.rs"

[dependencies]
num = "0.4.3"
paste = "1.0.15"
rand = "0.9.0"
rayon = {version = "1.10.0"}
csv = "1.1"
serde = {version="1.0.219", features=["derive"]}
serde_json = "1.0.142"
mpi = {version="0.8.0", optional=true}

[features]
mpi = ["dep:mpi"]

[package.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "katex-header.html"]

[dev-dependencies]
tantale = { path = "../", package = "tantale" }
