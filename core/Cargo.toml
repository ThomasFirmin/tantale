[package]
name = "tantale_core"
version = "0.1.0"
edition = "2024"

[lib]
path = "src/lib.rs"

[dependencies]
num = "0.4.3"
paste = "1.0.15"
rand = "0.9.0"
rayon = "1.10.0"
csv = "1.1"
serde = {version="1.0.219", features=["derive","rc"]}
rmp-serde = "1.3.0"
mpi = {version = "0.8.0", features=["derive"], optional=true}
bincode = {version = "2.0.1", features=["serde"], optional=true}
bitvec = { version = "1.0.1", features = ["serde"], optional=true }
num_cpus = "1.17.0"

[features]
mpi = ["dep:mpi","dep:bincode","dep:bitvec"]

[package.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "katex-header.html"]

[dev-dependencies]
tantale = { path = "../", package = "tantale" }
