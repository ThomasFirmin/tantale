[package]
name = "tantale_algos"
version = "0.1.0"
edition = "2024"
license = "CECILL-C"
readme = "README.md"
rust-version = "1.91.1"
repository = "https://github.com/ThomasFirmin/tantale"
description = "This the algorithms module for Tantale. Tantale is a Rust library for Automated Machine Learning (AutoML) focusing on Hyperparameter Optimization and Neural Architecture Search. It provides a modular and extensible framework for defining search spaces, objectives, and optimization algorithms, with support for distributed computing and parallel execution."
keywords = ["automl", "hpo", "nas"]

[lib]
path = "src/lib.rs"

[dependencies]
tantale_core = {path="../core", version = "0.1.0"}
tantale_macros = {path="../macros", version = "0.1.0"}
num = "0.4.3"
rand = "0.9.0"
rayon = {version = "1.10.0"}
serde = {version="1.0.219", features=["derive"]}
serde_json = "1.0.142"

[features]
mpi = ["tantale_core/mpi"]

[package.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "katex-header.html"]