[package]
name = "tantale_algos"
version = "0.1.0"
edition = "2024"
license = "CECILL-C"
readme = "README.md"
rust-version = "1.91.1"

[lib]
path = "src/lib.rs"

[dependencies]
tantale_core = {path="../core"}
tantale_macros = {path="../macros"}
num = "0.4.3"
rand = "0.9.0"
rayon = {version = "1.10.0"}
serde = {version="1.0.219", features=["derive"]}
serde_json = "1.0.142"

[features]
mpi = ["tantale_core/mpi"]

[package.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "katex-header.html"]