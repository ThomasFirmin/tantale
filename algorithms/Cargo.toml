[package]
name = "tantale_algos"
version = "0.1.0"
edition = "2021"

[lib]
path = "src/lib.rs"

[dependencies]
tantale_core = {path="../core"}
num = "0.4.3"
rand = "0.9.0"
rayon = {version = "1.10.0", optional=true}

[features]
par = ["dep:rayon", "tantale_core/par"]

[package.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "katex-header.html"]