[package]
name = "tantale"
version = "0.1.0"
edition = "2021"
license = "MIT"
readme = "README.md"
rust-version = "1.84.1"

[dependencies]
num = "0.4.3"
paste = "1.0.15"
rand = "0.9.0"
tantale_core = { path = "core" }
tantale_macros = { path = "macros" }

[package.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "katex-header.html"]

[badges]
maintenance = { status = "actively-developed" }

[workspace]
members = ["macros", "core"]