[package]
name = "tantale"
version = "0.1.0"
edition = "2021"
license = "MIT"
readme = "README.md"
rust-version = "1.84.1"

[package.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "katex-header.html"]

[badges]
maintenance = { status = "actively-developed" }


[workspace]
members = ["macros", "core", "algorithms", "tests_suite"]

[workspace.dependencies]
tantale_core = { path = "core" }
tantale_macros = { path = "macros" }
tantale_algos = { path = "algorithms" }
tantale_tests = { path = "tests_suite" }

[dependencies]
tantale_core.workspace = true
tantale_macros.workspace = true
tantale_algos.workspace = true

[features]
mpi = ["tantale_core/mpi"]

[dev-dependencies]
tantale_tests.workspace = true
